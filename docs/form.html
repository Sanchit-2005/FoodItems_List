<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Add items</title>
  </head>
  <body>
    <h1>Add Item</h1>
    <form action="/foods" method="post" enctype="multipart/form-data">
        
      <label for="name">Food Item Name:</label>
      <input type="text" name="name" id="name" required /><br /><br />

      <label for="price">Price:</label>
      <input type="number" name="price" id="price" required /><br /><br />

      

      <label for="available">Available:</label>
      <input type="checkbox" name="available" id="available" /><br /><br />

      <label for="photo">Photo:</label>
      <input type="file" name="photo" id="photo" accept="image/*" required /><br /><br />

      <button type="submit">Add Item</button>
    </form>
  </body>
</html>
